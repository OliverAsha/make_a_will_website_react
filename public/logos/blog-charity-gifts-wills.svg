<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <rect width="400" height="320" fill="#faf8f6"/>
  <ellipse cx="200" cy="175" rx="155" ry="135" fill="#f0ebe6"/>
  <ellipse cx="200" cy="185" rx="115" ry="100" fill="#e0d6cc"/>
  <polygon points="60,265 340,265 360,285 40,285" fill="#c4b5a5"/>
  <polygon points="40,285 360,285 380,295 20,295" fill="#e0d6cc"/>

  <!-- Envelope -->
  <g>
    <!-- Envelope body -->
    <polygon points="120,155 280,155 280,235 120,235" fill="#f0ebe6"/>
    <polygon points="120,155 280,155 280,160 120,160" fill="#e0d6cc"/>
    <!-- Envelope side shading -->
    <polygon points="275,155 280,155 280,235 275,235" fill="#c4b5a5"/>
    <!-- Open flap -->
    <polygon points="120,155 200,105 280,155" fill="#e0d6cc"/>
    <polygon points="120,155 200,115 200,105" fill="#faf8f6"/>
    <polygon points="280,155 200,115 200,105" fill="#c4b5a5"/>
    <!-- Bottom flap fold -->
    <polygon points="120,235 200,200 280,235" fill="#c4b5a5"/>
  </g>

  <!-- Large heart being placed into envelope -->
  <g>
    <!-- Left lobe -->
    <polygon points="200,100 178,80 162,85 160,105 180,120" fill="#D4832E"/>
    <polygon points="178,80 170,75 162,85" fill="#E5A630"/>
    <polygon points="160,105 170,110 180,120 168,115" fill="#B86D1F"/>
    <!-- Right lobe -->
    <polygon points="200,100 222,80 238,85 240,105 220,120" fill="#B86D1F"/>
    <polygon points="222,80 230,75 238,85" fill="#D4832E"/>
    <polygon points="240,105 230,110 220,120 232,115" fill="#8B4D3B"/>
    <!-- Bottom point -->
    <polygon points="180,120 200,148 220,120 200,115" fill="#D4832E"/>
    <polygon points="180,120 200,148 190,135" fill="#E5A630"/>
    <polygon points="220,120 200,148 210,135" fill="#B86D1F"/>
  </g>

  <!-- Small figure left -->
  <g>
    <!-- Head -->
    <polygon points="95,170 100,164 108,164 113,170 110,177 98,177" fill="#e0d6cc"/>
    <!-- Body -->
    <polygon points="97,180 111,180 115,215 93,215" fill="#D4832E"/>
    <!-- Arm reaching right -->
    <polygon points="111,185 130,175 132,180 113,192" fill="#E5A630"/>
  </g>

  <!-- Small figure right -->
  <g>
    <!-- Head -->
    <polygon points="287,170 292,164 300,164 305,170 302,177 290,177" fill="#e0d6cc"/>
    <!-- Body -->
    <polygon points="289,180 303,180 307,215 285,215" fill="#8B4D3B"/>
    <!-- Arm reaching left -->
    <polygon points="289,185 270,175 268,180 287,192" fill="#6D3A2C"/>
  </g>

  <!-- Decorative leaves bottom-left -->
  <g>
    <polygon points="55,260 70,250 75,260" fill="#5a8a4a"/>
    <polygon points="55,260 70,255 65,265" fill="#4a7a3a"/>
    <polygon points="80,258 90,248 95,258" fill="#6a9a5a"/>
    <polygon points="80,258 90,252 85,263" fill="#5a8a4a"/>
  </g>

  <!-- Decorative leaves bottom-right -->
  <g>
    <polygon points="325,260 310,250 305,260" fill="#5a8a4a"/>
    <polygon points="325,260 310,255 315,265" fill="#4a7a3a"/>
    <polygon points="300,258 290,248 285,258" fill="#6a9a5a"/>
    <polygon points="300,258 290,252 295,263" fill="#5a8a4a"/>
  </g>

  <!-- Diamond top-left -->
  <polygon points="45,30 55,22 65,30 55,38" fill="#E5A630"/>
  <!-- Diamond top-right -->
  <polygon points="335,30 345,22 355,30 345,38" fill="#D4832E"/>

  <!-- Accent circles -->
  <circle cx="50" cy="55" r="3" fill="#E5A630"/>
  <circle cx="350" cy="55" r="3" fill="#D4832E"/>
  <circle cx="200" cy="70" r="2.5" fill="#B86D1F"/>
</svg>