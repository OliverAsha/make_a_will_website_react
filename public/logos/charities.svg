<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <rect width="400" height="320" fill="#faf8f6"/>
  <ellipse cx="200" cy="175" rx="155" ry="135" fill="#f0ebe6"/>
  <ellipse cx="200" cy="185" rx="115" ry="100" fill="#e0d6cc"/>
  <polygon points="60,265 340,265 360,285 40,285" fill="#c4b5a5"/>
  <polygon points="40,285 360,285 380,295 20,295" fill="#e0d6cc"/>

  <!-- Envelope partially behind heart -->
  <g>
    <!-- Envelope body -->
    <polygon points="135,145 265,145 265,225 135,225" fill="#f0ebe6"/>
    <polygon points="135,145 265,145 265,150 135,150" fill="#e0d6cc"/>
    <polygon points="260,145 265,145 265,225 260,225" fill="#c4b5a5"/>
    <!-- Envelope flap (closed, behind heart) -->
    <polygon points="135,145 200,115 265,145" fill="#c4b5a5"/>
    <polygon points="135,145 200,120 200,115" fill="#e0d6cc"/>
    <!-- Bottom flap -->
    <polygon points="135,225 200,195 265,225" fill="#c4b5a5"/>
  </g>

  <!-- Large heart -->
  <g>
    <!-- Left lobe -->
    <polygon points="200,90 170,65 148,72 145,100 175,120" fill="#D4832E"/>
    <polygon points="170,65 158,58 148,72" fill="#E5A630"/>
    <polygon points="145,100 155,95 165,108 150,105" fill="#B86D1F"/>
    <polygon points="175,120 165,108 155,95 145,100" fill="#D4832E"/>
    <!-- Right lobe -->
    <polygon points="200,90 230,65 252,72 255,100 225,120" fill="#B86D1F"/>
    <polygon points="230,65 242,58 252,72" fill="#D4832E"/>
    <polygon points="255,100 245,95 235,108 250,105" fill="#8B4D3B"/>
    <polygon points="225,120 235,108 245,95 255,100" fill="#B86D1F"/>
    <!-- Bottom point -->
    <polygon points="175,120 200,155 225,120 200,112" fill="#D4832E"/>
    <polygon points="175,120 200,155 188,138" fill="#E5A630"/>
    <polygon points="225,120 200,155 212,138" fill="#B86D1F"/>
    <!-- Centre highlight -->
    <polygon points="190,90 200,82 210,90 200,100" fill="#E5A630"/>
  </g>

  <!-- Left hand reaching up -->
  <g>
    <!-- Wrist/arm -->
    <polygon points="110,230 130,230 135,195 105,195" fill="#e0d6cc"/>
    <!-- Palm -->
    <polygon points="105,195 135,195 138,178 102,178" fill="#f0ebe6"/>
    <!-- Fingers -->
    <polygon points="105,178 112,178 110,162 103,162" fill="#e0d6cc"/>
    <polygon points="114,178 121,178 119,158 112,158" fill="#f0ebe6"/>
    <polygon points="123,178 130,178 128,160 121,160" fill="#e0d6cc"/>
    <polygon points="132,178 138,178 137,165 131,165" fill="#f0ebe6"/>
    <!-- Thumb -->
    <polygon points="102,190 97,180 100,178 105,185" fill="#e0d6cc"/>
  </g>

  <!-- Right hand reaching up -->
  <g>
    <!-- Wrist/arm -->
    <polygon points="270,230 290,230 295,195 265,195" fill="#e0d6cc"/>
    <!-- Palm -->
    <polygon points="265,195 295,195 298,178 262,178" fill="#f0ebe6"/>
    <!-- Fingers -->
    <polygon points="265,178 272,178 270,162 263,162" fill="#e0d6cc"/>
    <polygon points="274,178 281,178 279,158 272,158" fill="#f0ebe6"/>
    <polygon points="283,178 290,178 288,160 281,160" fill="#e0d6cc"/>
    <polygon points="292,178 298,178 297,165 291,165" fill="#f0ebe6"/>
    <!-- Thumb -->
    <polygon points="298,190 303,180 300,178 295,185" fill="#e0d6cc"/>
  </g>

  <!-- Decorative leaves bottom-left -->
  <g>
    <polygon points="55,260 70,250 75,260" fill="#5a8a4a"/>
    <polygon points="55,260 70,255 65,265" fill="#4a7a3a"/>
    <polygon points="80,258 90,248 95,258" fill="#6a9a5a"/>
    <polygon points="80,258 90,252 85,263" fill="#5a8a4a"/>
  </g>

  <!-- Decorative leaves bottom-right -->
  <g>
    <polygon points="325,260 310,250 305,260" fill="#5a8a4a"/>
    <polygon points="325,260 310,255 315,265" fill="#4a7a3a"/>
    <polygon points="300,258 290,248 285,258" fill="#6a9a5a"/>
    <polygon points="300,258 290,252 295,263" fill="#5a8a4a"/>
  </g>

  <!-- Diamond top-left -->
  <polygon points="45,30 55,22 65,30 55,38" fill="#E5A630"/>
  <!-- Diamond top-right -->
  <polygon points="335,30 345,22 355,30 345,38" fill="#D4832E"/>

  <!-- Accent circles -->
  <circle cx="50" cy="55" r="3" fill="#E5A630"/>
  <circle cx="350" cy="55" r="3" fill="#D4832E"/>
  <circle cx="200" cy="50" r="2.5" fill="#B86D1F"/>
</svg>