    <!-- Head -->
    <polygon points="230,210 236,205 242,210 239,216 233,216" fill="#E5A630"/>
    <polygon points="236,205 242,210 239,207" fill="#D4832E"/>
    <!-- Torso -->
    <polygon points="228,218 242,218 241,242 227,244" fill="#D4832E"/>
    <polygon points="242,218 248,220 247,244 241,242" fill="#B86D1F"/>
