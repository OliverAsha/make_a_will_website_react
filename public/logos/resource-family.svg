<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <!-- Warm background -->
  <rect width="400" height="320" fill="#faf8f6"/>
  <ellipse cx="200" cy="175" rx="155" ry="135" fill="#f0ebe6"/>
  <ellipse cx="200" cy="185" rx="115" ry="100" fill="#e0d6cc"/>
  <!-- Ground surface -->
  <polygon points="60,265 340,265 360,285 40,285" fill="#c4b5a5"/>
  <polygon points="40,285 360,285 380,295 20,295" fill="#e0d6cc"/>

  <!-- Origami house -->
  <g>
    <!-- Roof left facet -->
    <polygon points="200,80 120,145 200,135" fill="#D4832E"/>
    <!-- Roof right facet -->
    <polygon points="200,80 280,145 200,135" fill="#B86D1F"/>
    <!-- Roof peak highlight -->
    <polygon points="192,84 200,80 208,84 200,90" fill="#E5A630"/>
    <!-- Wall left facet -->
    <polygon points="130,142 200,133 200,255 130,260" fill="#faf8f6"/>
    <!-- Wall right facet -->
    <polygon points="200,133 270,142 270,260 200,255" fill="#f0ebe6"/>
    <!-- Door -->
    <polygon points="185,200 215,198 215,255 185,258" fill="#8B4D3B"/>
    <polygon points="185,200 200,198 200,255 185,258" fill="#6D3A2C"/>
    <!-- Door handle -->
    <polygon points="207,225 210,223 211,228 208,230" fill="#E5A630"/>
    <!-- Window left -->
    <polygon points="142,162 168,160 168,185 142,187" fill="#2D6A8A"/>
    <polygon points="142,162 155,160 155,185 142,187" fill="#3d7a9a"/>
    <!-- Window cross -->
    <polygon points="142,172 168,170 168,173 142,175" fill="#f0ebe6"/>
    <polygon points="154,160 156,160 156,187 154,187" fill="#f0ebe6"/>
    <!-- Window right -->
    <polygon points="232,162 258,160 258,185 232,187" fill="#2D6A8A"/>
    <polygon points="232,162 245,160 245,185 232,187" fill="#3d7a9a"/>
    <!-- Chimney -->
    <polygon points="240,85 258,83 260,130 242,133" fill="#8B4D3B"/>
    <polygon points="258,83 268,86 270,133 260,130" fill="#6D3A2C"/>
  </g>

  <!-- Origami heart above house -->
  <g>
    <polygon points="200,48 188,38 180,42 182,55 200,68" fill="#D4832E"/>
    <polygon points="200,48 212,38 220,42 218,55 200,68" fill="#B86D1F"/>
    <polygon points="200,48 188,38 195,36 200,42" fill="#E5A630"/>
    <polygon points="200,48 212,38 205,36 200,42" fill="#D4832E"/>
  </g>

  <!-- Adult figure 1 (left, taller) -->
  <g>
    <!-- Head -->
    <polygon points="88,172 96,165 104,172 100,180 92,180" fill="#E5A630"/>
    <polygon points="96,165 104,172 100,168" fill="#D4832E"/>
    <!-- Torso -->
    <polygon points="88,182 104,182 102,225 86,228" fill="#D4832E"/>
    <polygon points="104,182 112,185 110,228 102,225" fill="#B86D1F"/>
