    <polygon points="298,172 306,165 314,172 310,180 302,180" fill="#E5A630"/>
    <polygon points="306,165 314,172 310,168" fill="#D4832E"/>
    <!-- Torso -->
    <polygon points="295,182 312,182 310,225 293,228" fill="#2D6A8A"/>
