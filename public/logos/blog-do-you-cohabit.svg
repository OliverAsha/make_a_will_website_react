<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <rect width="400" height="320" fill="#faf8f6"/>
  <ellipse cx="200" cy="175" rx="155" ry="135" fill="#f0ebe6"/>
  <ellipse cx="200" cy="185" rx="115" ry="100" fill="#e0d6cc"/>
  <polygon points="60,265 340,265 360,285 40,285" fill="#c4b5a5"/>
  <polygon points="40,285 360,285 380,295 20,295" fill="#e0d6cc"/>

  <!-- House -->
  <g>
    <!-- Roof - triangular, orange tones -->
    <polygon points="200,75 145,130 200,125" fill="#D4832E"/>
    <polygon points="200,75 255,130 200,125" fill="#B86D1F"/>
    <polygon points="145,130 200,125 170,130" fill="#E5A630"/>
    <polygon points="255,130 200,125 230,130" fill="#D4832E"/>
    <!-- Chimney -->
    <polygon points="230,85 230,100 242,100 242,90" fill="#8B4D3B"/>
    <!-- House body - beige polygons -->
    <polygon points="150,130 200,130 200,195 150,195" fill="#f0ebe6"/>
    <polygon points="200,130 250,130 250,195 200,195" fill="#e0d6cc"/>
    <!-- Door -->
    <polygon points="185,160 215,160 215,195 185,195" fill="#8B4D3B"/>
    <polygon points="185,160 200,155 215,160" fill="#6D3A2C"/>
    <!-- Window left -->
    <polygon points="157,142 175,142 175,158 157,158" fill="#2D6A8A"/>
    <!-- Window right -->
    <polygon points="225,142 243,142 243,158 225,158" fill="#2D6A8A"/>
  </g>

  <!-- Person 1 (left, blue tones) -->
  <g>
    <!-- Head -->
    <polygon points="120,165 126,158 134,158 140,165 137,173 123,173" fill="#e0d6cc"/>
    <!-- Body - trapezoidal -->
    <polygon points="122,176 138,176 143,220 117,220" fill="#2D6A8A"/>
    <!-- Legs -->
    <polygon points="117,220 127,220 126,245 118,245" fill="#3a7a9a"/>
    <polygon points="133,220 143,220 142,245 134,245" fill="#2D6A8A"/>
  </g>

  <!-- Person 2 (right, orange tones) -->
  <g>
    <!-- Head -->
    <polygon points="260,165 266,158 274,158 280,165 277,173 263,173" fill="#e0d6cc"/>
    <!-- Body - trapezoidal -->
    <polygon points="262,176 278,176 283,220 257,220" fill="#D4832E"/>
    <!-- Legs -->
    <polygon points="257,220 267,220 266,245 258,245" fill="#E5A630"/>
    <polygon points="273,220 283,220 282,245 274,245" fill="#D4832E"/>
  </g>

  <!-- Heart above -->
  <g>
    <!-- Left half -->
    <polygon points="200,48 188,38 180,42 182,55 200,65" fill="#D4832E"/>
    <!-- Right half -->
    <polygon points="200,48 212,38 220,42 218,55 200,65" fill="#B86D1F"/>
    <!-- Top accent -->
    <polygon points="188,38 194,32 200,38" fill="#E5A630"/>
    <polygon points="212,38 206,32 200,38" fill="#D4832E"/>
  </g>

  <!-- Decorative leaves bottom-left -->
  <g>
    <polygon points="55,260 70,250 75,260" fill="#5a8a4a"/>
    <polygon points="55,260 70,255 65,265" fill="#4a7a3a"/>
    <polygon points="80,258 90,248 95,258" fill="#6a9a5a"/>
    <polygon points="80,258 90,252 85,263" fill="#5a8a4a"/>
  </g>

  <!-- Decorative leaves bottom-right -->
  <g>
    <polygon points="325,260 310,250 305,260" fill="#5a8a4a"/>
    <polygon points="325,260 310,255 315,265" fill="#4a7a3a"/>
    <polygon points="300,258 290,248 285,258" fill="#6a9a5a"/>
    <polygon points="300,258 290,252 295,263" fill="#5a8a4a"/>
  </g>

  <!-- Diamond top-left -->
  <polygon points="45,30 55,22 65,30 55,38" fill="#E5A630"/>
  <!-- Diamond top-right -->
  <polygon points="335,30 345,22 355,30 345,38" fill="#D4832E"/>

  <!-- Accent circles -->
  <circle cx="50" cy="55" r="3" fill="#E5A630"/>
  <circle cx="350" cy="55" r="3" fill="#D4832E"/>
  <circle cx="200" cy="30" r="2.5" fill="#B86D1F"/>
</svg>