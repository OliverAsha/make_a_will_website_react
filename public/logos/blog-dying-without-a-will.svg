<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <!-- Warm background -->
  <rect width="400" height="320" fill="#faf8f6"/>
  <ellipse cx="200" cy="175" rx="155" ry="135" fill="#f0ebe6"/>
  <ellipse cx="200" cy="185" rx="115" ry="100" fill="#e0d6cc"/>
  <!-- Ground surface -->
  <polygon points="60,265 340,265 360,285 40,285" fill="#c4b5a5"/>
  <polygon points="40,285 360,285 380,295 20,295" fill="#e0d6cc"/>

  <!-- Broken document - left half -->
  <g>
    <!-- Paper left facet -->
    <polygon points="100,145 165,140 170,148 172,160 168,175 170,190 165,200 165,258 100,262" fill="#faf8f6"/>
    <!-- Paper inner edge (jagged) -->
    <polygon points="165,140 170,148 172,160 168,175 170,190 165,200 165,258 160,258 160,200 163,190 160,175 163,160 160,148 160,140" fill="#e0d6cc"/>
    <!-- Text lines left half -->
    <polygon points="112,168 155,166 155,172 112,174" fill="#e0d6cc"/>
    <polygon points="112,184 155,182 155,188 112,190" fill="#e0d6cc"/>
    <polygon points="112,200 150,198 150,204 112,206" fill="#e0d6cc"/>
    <polygon points="112,216 152,214 152,220 112,222" fill="#e0d6cc"/>
  </g>

  <!-- Broken document - right half -->
  <g>
    <!-- Paper right facet -->
    <polygon points="235,148 230,160 232,175 230,190 235,200 235,258 300,262 300,145 240,140" fill="#f0ebe6"/>
    <!-- Paper inner edge (jagged) -->
    <polygon points="240,140 235,148 230,160 232,175 230,190 235,200 235,258 240,258 240,200 237,190 240,175 237,160 240,148 240,140" fill="#e0d6cc"/>
    <!-- Fold corner -->
    <polygon points="282,140 300,145 300,162" fill="#e0d6cc"/>
    <!-- Text lines right half -->
    <polygon points="245,168 290,166 290,172 245,174" fill="#e0d6cc"/>
    <polygon points="245,184 285,182 285,188 245,190" fill="#e0d6cc"/>
    <polygon points="245,200 288,198 288,204 245,206" fill="#e0d6cc"/>
    <polygon points="245,216 282,214 282,220 245,222" fill="#e0d6cc"/>
  </g>

  <!-- Large origami question mark -->
  <g>
    <!-- Curve top of question mark -->
    <polygon points="175,60 225,55 235,65 235,82 220,95 200,100 195,95 210,88 215,78 215,68 210,62 185,64" fill="#D4832E"/>
    <polygon points="225,55 235,65 235,82 230,80 230,68 225,60" fill="#B86D1F"/>
    <polygon points="175,60 185,64 182,72 172,68" fill="#E5A630"/>
    <!-- Curve down stroke -->
    <polygon points="195,95 200,100 200,118 195,118" fill="#D4832E"/>
    <polygon points="200,100 205,98 205,118 200,118" fill="#B86D1F"/>
    <!-- Question mark dot -->
    <polygon points="192,125 200,120 208,125 200,135" fill="#E5A630"/>
    <polygon points="200,120 208,125 204,122" fill="#D4832E"/>
  </g>

  <!-- Origami leaf left -->
  <g>
    <polygon points="72,232 87,207 97,232 87,257" fill="#5a8a4a"/>
    <polygon points="87,207 97,232 92,220" fill="#4a7a3a"/>
    <polygon points="72,232 87,207 80,220" fill="#6a9a5a"/>
  </g>

  <!-- Origami leaf right -->
  <g>
    <polygon points="318,228 333,203 343,228 333,253" fill="#5a8a4a"/>
    <polygon points="333,203 343,228 338,216" fill="#4a7a3a"/>
    <polygon points="318,228 333,203 326,216" fill="#6a9a5a"/>
  </g>

  <!-- Decorative diamonds -->
  <polygon points="60,78 68,68 76,78 68,88" fill="#E5A630"/>
  <polygon points="68,68 76,78 72,73" fill="#D4832E"/>
  <polygon points="338,72 345,64 352,72 345,80" fill="#D4832E"/>
  <polygon points="345,64 352,72 348,68" fill="#B86D1F"/>

  <!-- Accent circles -->
  <circle cx="50" cy="112" r="7" fill="#f0ebe6"/>
  <circle cx="356" cy="108" r="5" fill="#e0d6cc"/>
  <circle cx="46" cy="256" r="5" fill="#E5A630"/>
</svg>