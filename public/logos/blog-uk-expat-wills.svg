<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <rect width="400" height="320" fill="#faf8f6"/>
  <ellipse cx="200" cy="175" rx="155" ry="135" fill="#f0ebe6"/>
  <ellipse cx="200" cy="185" rx="115" ry="100" fill="#e0d6cc"/>
  <polygon points="60,265 340,265 360,285 40,285" fill="#c4b5a5"/>
  <polygon points="40,285 360,285 380,295 20,295" fill="#e0d6cc"/>

  <!-- Globe - faceted sphere from polygons -->
  <g>
    <!-- Base octagonal shape -->
    <polygon points="175,100 225,100 250,130 250,170 225,200 175,200 150,170 150,130" fill="#2D6A8A"/>
    <!-- Land facets - green -->
    <polygon points="175,100 200,95 210,110 190,115" fill="#5a8a4a"/>
    <polygon points="210,110 240,120 250,130 225,125" fill="#4a7a3a"/>
    <polygon points="160,135 180,130 185,155 155,150" fill="#6a9a5a"/>
    <polygon points="195,140 220,135 230,160 205,165" fill="#5a8a4a"/>
    <polygon points="175,175 200,170 210,190 185,195" fill="#4a7a3a"/>
    <polygon points="220,160 245,155 250,170 235,175" fill="#6a9a5a"/>
    <!-- Water facets - blue variations -->
    <polygon points="225,100 250,130 240,110" fill="#3a8aaa"/>
    <polygon points="150,130 160,135 155,150 150,145" fill="#2D6A8A"/>
    <polygon points="185,155 205,165 200,180 180,175" fill="#3a8aaa"/>
    <polygon points="230,160 250,170 245,185 235,175" fill="#2D6A8A"/>
    <!-- Highlight facet -->
    <polygon points="165,110 175,100 185,108 175,118" fill="#4a9aba"/>
  </g>

  <!-- Paper airplane -->
  <g>
    <polygon points="290,90 320,110 295,108" fill="#faf8f6"/>
    <polygon points="290,90 295,108 288,115" fill="#e0d6cc"/>
    <polygon points="290,90 288,115 280,105" fill="#c4b5a5"/>
    <!-- Wing fold line -->
    <polygon points="290,90 305,100 295,103" fill="#f0ebe6"/>
  </g>

  <!-- Document -->
  <g>
    <!-- Paper body -->
    <polygon points="90,145 130,145 130,215 90,215" fill="#faf8f6"/>
    <polygon points="130,145 135,148 135,218 130,215" fill="#e0d6cc"/>
    <!-- Folded corner -->
    <polygon points="120,145 130,145 130,155" fill="#c4b5a5"/>
    <!-- Text lines -->
    <polygon points="97,160 123,160 123,163 97,163" fill="#c4b5a5"/>
    <polygon points="97,170 120,170 120,173 97,173" fill="#c4b5a5"/>
    <polygon points="97,180 118,180 118,183 97,183" fill="#c4b5a5"/>
    <polygon points="97,190 115,190 115,193 97,193" fill="#c4b5a5"/>
    <!-- Seal/stamp -->
    <polygon points="105,200 110,197 115,200 112,206 108,206" fill="#D4832E"/>
  </g>

  <!-- Decorative leaves bottom-left -->
  <g>
    <polygon points="55,260 70,250 75,260" fill="#5a8a4a"/>
    <polygon points="55,260 70,255 65,265" fill="#4a7a3a"/>
    <polygon points="80,258 90,248 95,258" fill="#6a9a5a"/>
    <polygon points="80,258 90,252 85,263" fill="#5a8a4a"/>
  </g>

  <!-- Decorative leaves bottom-right -->
  <g>
    <polygon points="325,260 310,250 305,260" fill="#5a8a4a"/>
    <polygon points="325,260 310,255 315,265" fill="#4a7a3a"/>
    <polygon points="300,258 290,248 285,258" fill="#6a9a5a"/>
    <polygon points="300,258 290,252 295,263" fill="#5a8a4a"/>
  </g>

  <!-- Diamond top-left -->
  <polygon points="45,30 55,22 65,30 55,38" fill="#E5A630"/>
  <!-- Diamond top-right -->
  <polygon points="335,30 345,22 355,30 345,38" fill="#D4832E"/>

  <!-- Accent circles -->
  <circle cx="50" cy="55" r="3" fill="#E5A630"/>
  <circle cx="350" cy="55" r="3" fill="#D4832E"/>
  <circle cx="310" cy="80" r="2" fill="#B86D1F"/>
</svg>