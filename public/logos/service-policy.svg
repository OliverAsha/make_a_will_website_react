<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <rect width="400" height="320" fill="#faf8f6"/>
  <ellipse cx="200" cy="175" rx="155" ry="135" fill="#f0ebe6"/>
  <ellipse cx="200" cy="185" rx="115" ry="100" fill="#e0d6cc"/>
  <polygon points="60,265 340,265 360,285 40,285" fill="#c4b5a5"/>
  <polygon points="40,285 360,285 380,295 20,295" fill="#e0d6cc"/>

  <!-- Document behind shield -->
  <g id="document">
    <!-- Document body -->
    <polygon points="155,90 190,85 190,250 155,255" fill="#f0ebe6"/>
    <polygon points="190,85 260,90 260,255 190,250" fill="#e0d6cc"/>
    <!-- Corner fold -->
    <polygon points="240,85 260,90 260,108 243,103" fill="#c4b5a5"/>
    <polygon points="240,85 243,103 238,104" fill="#e0d6cc"/>
    <!-- Text lines (visible above/below shield) -->
    <polygon points="165,105 230,102 230,108 165,111" fill="#c4b5a5"/>
    <polygon points="165,235 225,232 225,238 165,241" fill="#c4b5a5"/>
    <polygon points="165,248 240,245 240,251 165,254" fill="#c4b5a5"/>
  </g>

  <!-- Origami Shield -->
  <g id="shield">
    <!-- Shield left facet (lighter) -->
    <polygon points="145,115 200,105 200,215 175,240" fill="#3a8aaa"/>
    <!-- Shield right facet (darker) -->
    <polygon points="200,105 255,115 225,240 200,215" fill="#2D6A8A"/>
    <!-- Shield top-left highlight -->
    <polygon points="145,115 200,105 185,112 155,120" fill="#4a9aba"/>
    <!-- Shield top-right shadow -->
    <polygon points="200,105 255,115 245,120 215,112" fill="#1d5a7a"/>
    <!-- Shield bottom-left facet -->
    <polygon points="155,120 200,130 200,215 175,240" fill="#3a8aaa"/>
    <!-- Shield bottom-right facet -->
    <polygon points="200,130 245,120 225,240 200,215" fill="#2D6A8A"/>
    <!-- Shield center chevron (protective emblem) -->
    <polygon points="185,145 200,140 215,145 200,170" fill="#4a9aba"/>
    <polygon points="200,140 215,145 200,170" fill="#2D6A8A"/>
    <!-- Shield inner lines -->
    <polygon points="175,180 200,175 225,180 200,185" fill="#1d5a7a"/>
    <polygon points="180,195 200,191 220,195 200,199" fill="#3a8aaa"/>
  </g>

  <!-- Decorative elements -->
  <g id="decorations">
    <!-- Top-left diamond -->
    <polygon points="78,55 88,45 98,55 88,65" fill="#E5A630"/>
    <!-- Top-right diamond -->
    <polygon points="312,50 322,40 332,50 322,60" fill="#2D6A8A"/>

    <!-- Bottom-left leaf pair -->
    <polygon points="68,258 83,243 88,253 78,263" fill="#5a8a4a"/>
    <polygon points="88,253 98,246 93,260 83,263" fill="#4a7a3a"/>
    <!-- Bottom-right leaf pair -->
    <polygon points="318,258 328,243 338,253 328,263" fill="#5a8a4a"/>
    <polygon points="328,253 343,246 338,260 328,263" fill="#6a9a5a"/>

    <!-- Accent circles -->
    <circle cx="200" cy="82" r="3" fill="#E5A630"/>
    <circle cx="130" cy="180" r="3" fill="#2D6A8A"/>
    <circle cx="270" cy="180" r="3" fill="#2D6A8A"/>
  </g>
</svg>