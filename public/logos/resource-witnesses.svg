    <polygon points="178,132 242,132 242,135 178,135" fill="#c4b5a5"/>
    <polygon points="178,142 238,142 238,145 178,145" fill="#c4b5a5"/>
    <polygon points="178,152 240,152 240,155 178,155" fill="#c4b5a5"/>
    <polygon points="178,162 235,162 235,165 178,165" fill="#c4b5a5"/>
    <polygon points="178,172 237,172 237,175 178,175" fill="#c4b5a5"/>
    <polygon points="178,182 233,182 233,185 178,185" fill="#c4b5a5"/>
