    <polygon points="110,248 125,248 128,255 110,255" fill="#8B4D3B"/>
  </g>

  <!-- Pen in left person's hand -->
  <g>
    <polygon points="152,150 158,148 170,200 165,202" fill="#D4832E"/>
    <polygon points="152,150 155,149 158,148 155,151" fill="#E5A630"/>
    <polygon points="165,202 170,200 172,210 167,212" fill="#6D3A2C"/>
    <polygon points="167,212 172,210 170,218" fill="#E5A630"/>
