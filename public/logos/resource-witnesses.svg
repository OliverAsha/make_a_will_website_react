    <!-- Head -->
    <polygon points="285,125 295,117 305,125 300,135 290,135" fill="#2D6A8A"/>
    <polygon points="285,125 295,117 290,123 285,125" fill="#1d5a7a"/>
    <!-- Body / torso -->
    <polygon points="275,145 295,135 315,145 310,200 280,200" fill="#2D6A8A"/>
    <polygon points="275,145 295,135 285,140 275,145" fill="#1d5a7a"/>
    <polygon points="295,135 315,145 310,150 295,140" fill="#1d5a7a"/>
