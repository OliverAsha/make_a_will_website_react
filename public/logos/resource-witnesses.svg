    <polygon points="125,140 130,145 135,160 125,155" fill="#6D3A2C"/>
    <!-- Legs -->
    <polygon points="90,195 100,195 98,250 88,250" fill="#6D3A2C"/>
    <polygon points="110,195 120,195 122,250 112,250" fill="#8B4D3B"/>
    <!-- Feet -->
