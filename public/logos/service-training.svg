<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <rect width="400" height="320" fill="#faf8f6"/>
  <ellipse cx="200" cy="175" rx="155" ry="135" fill="#f0ebe6"/>
  <ellipse cx="200" cy="185" rx="115" ry="100" fill="#e0d6cc"/>
  <polygon points="60,265 340,265 360,285 40,285" fill="#c4b5a5"/>
  <polygon points="40,285 360,285 380,295 20,295" fill="#e0d6cc"/>

  <!-- Easel Stand (triangular legs) -->
  <g id="easel-stand">
    <!-- Left leg -->
    <polygon points="120,210 127,210 155,260 148,260" fill="#8B4D3B"/>
    <!-- Right leg -->
    <polygon points="253,210 260,210 232,260 225,260" fill="#8B4D3B"/>
    <!-- Back leg (center, darker) -->
    <polygon points="187,210 193,210 193,260 187,260" fill="#6D3A2C"/>
    <!-- Cross bar -->
    <polygon points="140,240 240,240 240,245 140,245" fill="#6D3A2C"/>
  </g>

  <!-- Presentation Board -->
  <g id="board">
    <!-- Board left facet -->
    <polygon points="105,90 190,85 190,210 105,215" fill="#f0ebe6"/>
    <!-- Board right facet -->
    <polygon points="190,85 275,90 275,215 190,210" fill="#e0d6cc"/>
    <!-- Board top edge -->
    <polygon points="105,90 275,90 278,95 102,95" fill="#c4b5a5"/>
    <!-- Board bottom edge -->
    <polygon points="102,210 278,210 275,215 105,215" fill="#c4b5a5"/>

    <!-- Bar chart on board -->
    <!-- Bar 1 (short, orange) -->
    <polygon points="125,195 140,195 140,165 125,165" fill="#D4832E"/>
    <polygon points="140,195 148,192 148,162 140,165" fill="#B86D1F"/>
    <polygon points="125,165 140,165 148,162 133,162" fill="#E5A630"/>

    <!-- Bar 2 (tall, green) -->
    <polygon points="155,195 170,195 170,130 155,130" fill="#5a8a4a"/>
    <polygon points="170,195 178,192 178,127 170,130" fill="#4a7a3a"/>
    <polygon points="155,130 170,130 178,127 163,127" fill="#6a9a5a"/>

    <!-- Bar 3 (medium, gold) -->
    <polygon points="185,195 200,195 200,148 185,148" fill="#E5A630"/>
    <polygon points="200,195 208,192 208,145 200,148" fill="#D4832E"/>
    <polygon points="185,148 200,148 208,145 193,145" fill="#faf8f6"/>

    <!-- Bar 4 (tallest, orange) -->
    <polygon points="215,195 230,195 230,115 215,115" fill="#D4832E"/>
    <polygon points="230,195 238,192 238,112 230,115" fill="#B86D1F"/>
    <polygon points="215,115 230,115 238,112 223,112" fill="#E5A630"/>

    <!-- Bar 5 (medium-short, green) -->
    <polygon points="245,195 260,195 260,155 245,155" fill="#6a9a5a"/>
    <polygon points="260,195 268,192 268,152 260,155" fill="#4a7a3a"/>
    <polygon points="245,155 260,155 268,152 253,152" fill="#5a8a4a"/>
  </g>

  <!-- Origami Pointer Stick -->
  <g id="pointer">
    <!-- Stick shaft -->
    <polygon points="290,110 295,108 315,195 310,197" fill="#8B4D3B"/>
    <polygon points="295,108 298,110 318,197 315,195" fill="#6D3A2C"/>
    <!-- Pointer tip -->
    <polygon points="288,105 295,100 298,110 290,110" fill="#D4832E"/>
    <polygon points="295,100 302,105 298,110" fill="#B86D1F"/>
  </g>

  <!-- Decorative elements -->
  <g id="decorations">
    <!-- Top-left diamond -->
    <polygon points="72,55 82,45 92,55 82,65" fill="#E5A630"/>
    <!-- Top-right diamond -->
    <polygon points="318,50 328,40 338,50 328,60" fill="#D4832E"/>

    <!-- Bottom-left leaf pair -->
    <polygon points="65,258 80,243 85,253 75,263" fill="#5a8a4a"/>
    <polygon points="85,253 95,246 90,260 80,263" fill="#4a7a3a"/>
    <!-- Bottom-right leaf pair -->
    <polygon points="320,258 330,243 340,253 330,263" fill="#5a8a4a"/>
    <polygon points="330,253 345,246 340,260 330,263" fill="#6a9a5a"/>

    <!-- Accent circles -->
    <circle cx="190" cy="78" r="3" fill="#E5A630"/>
    <circle cx="285" cy="200" r="3" fill="#D4832E"/>
    <circle cx="100" cy="230" r="3" fill="#5a8a4a"/>
  </g>
</svg>