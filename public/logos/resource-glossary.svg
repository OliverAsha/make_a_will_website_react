    <!-- Left page -->
    <polygon points="75,120 195,115 195,248 70,253" fill="#faf8f6"/>
    <polygon points="75,120 195,115 192,118 77,123" fill="#e0d6cc"/>
    <!-- Left page text lines -->
    <polygon points="90,138 180,136 180,139 90,141" fill="#c4b5a5"/>
    <polygon points="92,151 178,149 178,152 92,154" fill="#c4b5a5"/>
    <polygon points="93,164 175,162 175,165 93,167" fill="#c4b5a5"/>
    <polygon points="94,177 173,175 173,178 94,180" fill="#c4b5a5"/>
    <polygon points="95,190 170,188 170,191 95,193" fill="#c4b5a5"/>
    <polygon points="96,203 168,201 168,204 96,206" fill="#c4b5a5"/>
    <polygon points="97,216 165,214 165,217 97,219" fill="#c4b5a5"/>
    <!-- Left page side shadow -->
    <polygon points="70,253 75,120 77,123 72,255" fill="#c4b5a5"/>

    <!-- Right page -->
    <polygon points="205,115 325,120 330,253 205,248" fill="#f0ebe6"/>
    <polygon points="205,115 325,120 323,123 208,118" fill="#e0d6cc"/>
    <!-- Right page text lines -->
    <polygon points="220,136 310,138 310,141 220,139" fill="#c4b5a5"/>
    <polygon points="222,149 308,151 308,154 222,152" fill="#c4b5a5"/>
    <polygon points="223,162 305,164 305,167 223,165" fill="#c4b5a5"/>
    <polygon points="224,175 303,177 303,180 224,178" fill="#c4b5a5"/>
    <polygon points="225,188 300,190 300,193 225,191" fill="#c4b5a5"/>
    <!-- Right page side shadow -->
    <polygon points="330,253 325,120 323,123 328,255" fill="#c4b5a5"/>

    <!-- Spine -->
    <polygon points="195,115 205,115 205,248 195,248" fill="#8B4D3B"/>
    <polygon points="195,115 200,113 205,115 200,117" fill="#6D3A2C"/>
  </g>

  <!-- Magnifying glass -->
  <g>
    <!-- Handle -->
    <polygon points="305,200 315,190 338,222 328,232" fill="#8B4D3B"/>
    <polygon points="305,200 315,190 320,195 310,205" fill="#6D3A2C"/>
    <!-- Handle end cap -->
    <polygon points="332,218 342,228 338,232 328,222" fill="#6D3A2C"/>
    <!-- Lens frame (hexagonal) -->
    <polygon points="282,155 305,143 320,155 320,178 305,190 282,178" fill="#D4832E"/>
    <!-- Lens inner frame -->
    <polygon points="286,158 303,148 316,158 316,175 303,186 286,175" fill="#E5A630"/>
    <!-- Glass area -->
    <polygon points="290,161 302,153 312,161 312,172 302,182 290,172" fill="#f0ebe6"/>
    <!-- Glass highlight -->
    <polygon points="292,160 299,155 304,160 299,164" fill="#faf8f6"/>
  </g>

  <!-- Bookmark ribbon (orange) -->
  <g>
    <polygon points="145,113 155,113 157,145 151,138 145,145" fill="#D4832E"/>
    <polygon points="145,113 150,113 152,140 148,135 145,140" fill="#B86D1F"/>
  </g>

  <!-- Second bookmark at spine -->
  <g>
    <polygon points="196,112 206,112 207,138 201,132 195,138" fill="#E5A630"/>
    <polygon points="196,112 201,112 202,135 199,130 196,135" fill="#D4832E"/>
  </g>

  <!-- Decorative leaves bottom-left -->
  <g>
    <polygon points="55,260 70,250 75,260" fill="#5a8a4a"/>
    <polygon points="55,260 70,255 65,265" fill="#4a7a3a"/>
    <polygon points="80,258 90,248 95,258" fill="#6a9a5a"/>
    <polygon points="80,258 90,252 85,263" fill="#5a8a4a"/>
  </g>

  <!-- Decorative leaves bottom-right -->
  <g>
    <polygon points="325,260 310,250 305,260" fill="#5a8a4a"/>
    <polygon points="325,260 310,255 315,265" fill="#4a7a3a"/>
    <polygon points="300,258 290,248 285,258" fill="#6a9a5a"/>
    <polygon points="300,258 290,252 295,263" fill="#5a8a4a"/>
  </g>

  <!-- Diamond top-left -->
  <polygon points="45,30 55,22 65,30 55,38" fill="#E5A630"/>
  <!-- Diamond top-right -->
  <polygon points="335,30 345,22 355,30 345,38" fill="#D4832E"/>

  <!-- Accent circles -->
  <circle cx="50" cy="55" r="3" fill="#E5A630"/>
  <circle cx="350" cy="55" r="3" fill="#D4832E"/>
  <circle cx="302" cy="167" r="2" fill="#faf8f6"/>
</svg>