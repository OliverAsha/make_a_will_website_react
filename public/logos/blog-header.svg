    <polygon points="127,162 183,160 183,163 127,165" fill="#c4b5a5"/>
    <polygon points="128,174 180,172 180,175 128,177" fill="#c4b5a5"/>
    <polygon points="129,186 178,184 178,187 129,189" fill="#c4b5a5"/>
    <polygon points="130,198 175,196 175,199 130,201" fill="#c4b5a5"/>
    <!-- Left page shadow -->
