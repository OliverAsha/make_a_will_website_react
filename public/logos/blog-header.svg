    <polygon points="195,125 202,125 204,170 200,180 196,170" fill="#D4832E"/>
    <polygon points="200,180 196,170 198,172" fill="#B86D1F"/>
    <polygon points="200,180 204,170 202,172" fill="#E5A630"/>
