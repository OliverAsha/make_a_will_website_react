  <!-- Floating page 1 (top left, tilted) -->
  <g>
    <polygon points="130,65 170,60 175,100 135,105" fill="#faf8f6"/>
    <polygon points="130,65 170,60 168,63 132,68" fill="#e0d6cc"/>
    <polygon points="138,75 163,72 163,75 138,78" fill="#c4b5a5"/>
    <polygon points="139,82 160,80 160,83 139,85" fill="#c4b5a5"/>
