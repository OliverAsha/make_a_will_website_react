    <polygon points="185,50 220,52 218,55 185,53" fill="#c4b5a5"/>
    <polygon points="190,62 212,63 212,66 190,65" fill="#c4b5a5"/>
    <polygon points="191,70 210,71 210,74 191,73" fill="#c4b5a5"/>
  </g>

  <!-- Floating page 3 (top right, tilted) -->
  <g>
    <polygon points="240,58 275,65 270,100 235,93" fill="#faf8f6"/>
    <polygon points="240,58 275,65 273,68 242,61" fill="#e0d6cc"/>
    <polygon points="245,72 268,77 268,80 245,75" fill="#c4b5a5"/>
